<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Há Combustível — Maputo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a18;
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      background: #1a1a18;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-title { font-size: 15px; font-weight: 700; color: #f5f5f0; letter-spacing: -0.01em; }
    .header-sub   { font-size: 10px; color: #888; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .lang-btn {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .lang-btn:hover { border-color: #888; color: #f5f5f0; }
    .refresh-btn {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .refresh-btn:hover { border-color: #888; color: #f5f5f0; }

    /* ── TOP PICKS ── */
    .top-picks {
      background: #fff;
      padding: 12px 16px 14px;
      border-bottom: 1px solid #e8e8e4;
    }
    .top-picks-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }
    .top-picks-list { display: flex; flex-direction: column; gap: 7px; }
    .top-pick-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f9f9f7;
      border-radius: 10px;
      padding: 9px 12px;
      border: 1px solid #e8e8e4;
    }
    .tp-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .tp-icon.verde   { background: #e8f5e9; }
    .tp-icon.amarelo { background: #fff8e1; }
    .tp-info { flex: 1; min-width: 0; }
    .tp-nome { font-size: 13px; font-weight: 600; color: #1a1a18; }
    .tp-bairro { font-size: 11px; color: #888; margin-top: 1px; }
    .tp-right { text-align: right; flex-shrink: 0; }
    .tp-status {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .tp-status.verde   { background: #e8f5e9; color: #2d7a3a; }
    .tp-status.amarelo { background: #fff8e1; color: #b07d00; }
    .tp-fila { font-size: 10px; color: #aaa; margin-top: 3px; }
    .top-picks-vazio { font-size: 12px; color: #aaa; font-style: italic; }

    /* ── ALERTAS ── */
    .banner-urgencia {
      background: #c0392b;
      color: #fff;
      padding: 8px 16px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }
    .banner-urgencia.visivel { display: block; }
    .alerta-transito {
      background: #fff8e1;
      border-bottom: 1px solid #ffe082;
      padding: 8px 16px;
      font-size: 12px;
      color: #b07d00;
      display: none;
    }
    .alerta-transito.visivel { display: block; }

    /* ── COUNTDOWN ── */
    .countdown-bar {
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
      padding: 5px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #aaa;
    }
    .countdown-progress {
      flex: 1; height: 2px;
      background: #f0f0ec;
      border-radius: 2px;
      margin: 0 10px;
      overflow: hidden;
    }
    .countdown-fill {
      height: 100%;
      background: #2d7a3a;
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 16px;
      background: #eeeee9;
      border-bottom: 1px solid #ddd;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      padding: 8px 10px;
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .stat-label { font-size: 10px; color: #888; margin-top: 2px; }
    .num-verde    { color: #2d7a3a; }
    .num-amarelo  { color: #b07d00; }
    .num-vermelho { color: #c0392b; }

    /* ── ZONA ── */
    .zona-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
    }
    .zona-label { white-space: nowrap; font-weight: 600; color: #1a1a18; font-size: 12px; }
    .zona-bar select {
      flex: 1;
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #f9f9f9;
      color: #1a1a18;
    }

    /* ── TABS ── */
    .modo-tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
    }
    .modo-tab {
      flex: 1;
      padding: 9px 4px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      color: #aaa;
      border-bottom: 2px solid transparent;
    }
    .modo-tab.on-lista  { color: #2d7a3a; border-bottom-color: #2d7a3a; }
    .modo-tab.on-resumo { color: #185fa5; border-bottom-color: #185fa5; }

    /* ── FILTROS ── */
    .filtros {
      display: flex;
      gap: 5px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
      flex-wrap: wrap;
    }
    .fbtn {
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .fbtn:hover { border-color: #aaa; }
    .fbtn.on          { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    .fbtn.on-verde    { background: #2d7a3a; color: #fff; border-color: #2d7a3a; }
    .fbtn.on-amarelo  { background: #b07d00; color: #fff; border-color: #b07d00; }
    .fbtn.on-verm     { background: #c0392b; color: #fff; border-color: #c0392b; }
    .fbtn.on-gasolina { background: #185fa5; color: #fff; border-color: #185fa5; }
    .fbtn.on-gasoleo  { background: #5a3e9e; color: #fff; border-color: #5a3e9e; }
    .fbtn.on-recentes { background: #0f6e56; color: #fff; border-color: #0f6e56; }
    .filtros-sep { width: 1px; background: #e8e8e4; margin: 2px; align-self: stretch; }

    /* ── LISTA ── */
    .lista { padding: 8px 16px 16px; }
    .bairro-bloco { margin-bottom: 4px; }
    .bairro-titulo {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 12px 0 5px;
    }
    .nota-desatualizada {
      background: #fff8e1;
      border-left: 3px solid #b07d00;
      padding: 7px 12px;
      font-size: 11px;
      color: #b07d00;
      margin: 6px 0 4px;
      border-radius: 0 6px 6px 0;
    }
    .bomba-card {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }
    .bomba-card:hover { border-color: #ccc; }
    .bomba-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .bomba-esq { display: flex; align-items: flex-start; gap: 9px; flex: 1; min-width: 0; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .dot-verde    { background: #2d7a3a; }
    .dot-amarelo  { background: #b07d00; }
    .dot-vermelho { background: #c0392b; }
    .dot-cinza    { background: #aaa; }
    .bomba-info { min-width: 0; flex: 1; }
    .bomba-nome { font-size: 13px; font-weight: 600; color: #1a1a18; }
    .bomba-combustivel { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
    .pill-comb { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
    .pill-gasolina { background: #e3eef9; color: #185fa5; }
    .pill-gasoleo  { background: #ede8f9; color: #5a3e9e; }
    .pill-ambos    { background: #e8f5e9; color: #2d7a3a; }
    .bomba-obs  { font-size: 11px; color: #666; margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bomba-hora { font-size: 10px; color: #bbb; margin-top: 2px; }
    .badge { flex-shrink: 0; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 10px; white-space: nowrap; }
    .badge-verde    { background: #e8f5e9; color: #2d7a3a; }
    .badge-amarelo  { background: #fff8e1; color: #b07d00; }
    .badge-vermelho { background: #fdecea; color: #c0392b; }
    .badge-cinza    { background: #f0f0f0; color: #888; }
    .report-count { font-size: 10px; color: #aaa; margin-top: 2px; font-weight: 500; }
    .report-count.alto  { color: #2d7a3a; }
    .report-count.medio { color: #b07d00; }
    .tempo-fila { font-size: 10px; color: #b07d00; font-weight: 600; margin-top: 2px; }
    .bomba-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px solid #f0f0ec;
    }
    .confirmar-btn {
      background: none;
      border: 1px solid #e0e0da;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
      flex: 1;
    }
    .confirmar-btn:hover { border-color: #2d7a3a; color: #2d7a3a; }
    .confirmar-btn.confirmado { border-color: #2d7a3a; color: #2d7a3a; background: #e8f5e9; }
    .actualizar-btn {
      background: none;
      border: 1px solid #e0e0da;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      color: #185fa5;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
      flex: 1;
      text-align: center;
    }
    .actualizar-btn:hover { border-color: #185fa5; background: #e3eef9; }

    /* ── RESUMO ── */
    .resumo-box {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 10px 0 8px;
      line-height: 1.7;
    }
    .resumo-titulo { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .resumo-zona { margin-bottom: 10px; }
    .resumo-zona-nome { font-weight: 700; color: #1a1a18; font-size: 13px; }
    .resumo-zona-txt { color: #555; font-size: 13px; }
    .partilhar-resumo {
      display: block;
      margin: 12px 0 0;
      padding: 12px;
      background: #25d366;
      color: #fff;
      text-align: center;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    .partilhar-resumo:hover { background: #1da851; }

    /* ── MISC ── */
    .vazio { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
    .loading { text-align: center; padding: 48px 20px; color: #888; font-size: 14px; }
    .erro { margin: 16px; padding: 12px 16px; background: #fdecea; border-radius: 8px; font-size: 13px; color: #c0392b; }
    .toggle-historico { font-size: 11px; color: #185fa5; text-align: center; padding: 8px; cursor: pointer; text-decoration: underline; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a18;
      color: #f5f5f0;
      border: none;
      border-radius: 28px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      text-decoration: none;
      display: inline-block;
    }
    .fab:hover { background: #333; }
    .fab-spacer { height: 72px; }
  </style>
</head>

<body>

<div class="header">
  <div>
    <div class="header-title" id="page-title">Há Combustível — Maputo</div>
    <div class="header-sub" id="header-sub">a carregar...</div>
  </div>
  <div class="header-right">
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
    <button class="refresh-btn" onclick="carregarDados()" id="btn-refresh">↻</button>
  </div>
</div>

<!-- TOP PICKS -->
<div class="top-picks">
  <div class="top-picks-label" id="tp-label">Melhores agora</div>
  <div class="top-picks-list" id="top-picks-list">
    <div class="top-picks-vazio" id="tp-vazio">A carregar...</div>
  </div>
</div>

<div class="banner-urgencia" id="banner-urgencia"></div>
<div class="alerta-transito" id="alerta-transito"></div>
<div class="countdown-bar">
  <span id="countdown-label">próxima atualização</span>
  <div class="countdown-progress"><div class="countdown-fill" id="countdown-fill" style="width:100%"></div></div>
  <span id="countdown-num">2:00</span>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num num-verde" id="count-verde">—</div>
    <div class="stat-label" id="lbl-disponivel">disponível</div>
  </div>
  <div class="stat-card">
    <div class="stat-num num-amarelo" id="count-amarelo">—</div>
    <div class="stat-label" id="lbl-fila">com fila</div>
  </div>
  <div class="stat-card">
    <div class="stat-num num-vermelho" id="count-vermelho">—</div>
    <div class="stat-label" id="lbl-esgotado">esgotado</div>
  </div>
</div>

<div class="zona-bar">
  <span class="zona-label" id="lbl-zona">A minha zona:</span>
  <select id="zona-select" onchange="guardarZona(this.value)">
    <option value="" id="opt-todas">Todas as zonas</option>
  </select>
</div>

<div class="modo-tabs">
  <div class="modo-tab on-lista" id="tab-lista" onclick="mudarModo('lista',this)">Lista de bombas</div>
  <div class="modo-tab" id="tab-resumo" onclick="mudarModo('resumo',this)">Situação agora</div>
</div>

<div id="painel-lista">
  <div class="filtros">
    <button class="fbtn on" id="f-todos"    onclick="filtrar('todos',this)">Todos</button>
    <button class="fbtn"    id="f-verde"    onclick="filtrar('verde',this)">Disponível</button>
    <button class="fbtn"    id="f-amarelo"  onclick="filtrar('amarelo',this)">Com fila</button>
    <button class="fbtn"    id="f-vermelho" onclick="filtrar('vermelho',this)">Esgotado</button>
    <div class="filtros-sep"></div>
    <button class="fbtn"    id="f-recentes" onclick="filtrarRecentes(this)">+ Recentes</button>
    <div class="filtros-sep"></div>
    <button class="fbtn"    id="f-gasolina" onclick="filtrarComb('gasolina',this)">Gasolina</button>
    <button class="fbtn"    id="f-gasoleo"  onclick="filtrarComb('gasoleo',this)">Gasóleo</button>
  </div>
  <div class="lista" id="lista">
    <div class="loading">A carregar bombas...</div>
  </div>
</div>

<div id="painel-resumo" style="display:none;padding:0 16px 16px;"></div>

<div class="fab-spacer"></div>
<a class="fab" id="fab-link" href="https://docs.google.com/forms/d/e/1FAIpQLSfv-UJyaqEVK3CF_c9yQaq1iE6Lr4dHmJhd0nU9DGRYhLxcCQ/viewform" target="_blank">+ Reportar uma bomba</a>

      ocultarAntigas: 'Hide stations with old info',
      nenhuma: 'No stations match this filter right now.',
      erroLigacao: 'slow connection — try refreshing',
      erroCarregar: 'loading error',
      erroMsg: 'Could not load data. Try tapping ↻ in a few seconds.',
      notaDes: (n) => `⚠ ${n} station${n>1?'s':''} without a recent report — info may be stale.`,
      situacaoAs: 'Situation at',
      topLabel: 'Best right now',
      topVazio: 'No available stations reported right now.',
      semFilaLabel: 'no queue', comFilaLabel: 'queue',
      tempoFila: (m) => m < 15 ? 'under 15 min wait' : m < 60 ? `~${m} min wait` : 'over 1h wait',
      infoAntiga: 'old info',
      confirmarVerde:   ['✓ Still open!','✓ Still available!','✓ Confirmed, still good!','✓ Yep, still has fuel!'],
      confirmarAmarelo: ['✓ Queue still there','✓ Still busy','✓ Queue confirmed','✓ Still a wait'],
      confirmarVermelho:['✓ Still empty','✓ Nothing yet','✓ Still dry','✓ No fuel yet'],
      atualizarVerde:   ['Ran out? Tell us!','Situation changed?','Queue appeared?','Changed? Report!'],
      atualizarAmarelo: ['Ran out? Tell us!','Queue gone?','Got worse? Report!','Changed? Tell us!'],
      atualizarVermelho:['Got fuel? Tell us!','Back open? Report!','Any update?','Improved? Let us know!'],
      confirmarLabel: '✓ Still the same',
    }
  };

  const t = (key, ...args) => { const v = T[lingua][key]; return typeof v === 'function' ? v(...args) : v; };
  const rnd = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const fraseConf = (s) => rnd(T[lingua]['confirmar' + s.charAt(0).toUpperCase() + s.slice(1)] || T[lingua].confirmarVerde);
  const fraseAtu  = (s) => rnd(T[lingua]['atualizar'  + s.charAt(0).toUpperCase() + s.slice(1)] || T[lingua].atualizarVerde);

  function toggleLang() {
    lingua = lingua === 'pt' ? 'en' : 'pt';
    localStorage.setItem('lingua', lingua);
    document.getElementById('lang-btn').textContent = lingua === 'pt' ? 'EN' : 'PT';
    aplicarTraducoes();
    atualizarTopPicks();
    renderizar();
    if (modoActivo === 'resumo') renderizarResumo();
  }

  function aplicarTraducoes() {
    const el = (id) => document.getElementById(id);
    el('lbl-disponivel').textContent = t('disponivel');
    el('lbl-fila').textContent       = t('comFila');
    el('lbl-esgotado').textContent   = t('esgotado');
    el('lbl-zona').textContent       = t('minhaZona');
    el('tab-lista').textContent      = t('listaBombas');
    el('tab-resumo').textContent     = t('situacaoAgora');
    el('f-todos').textContent        = t('todos');
    el('f-verde').textContent        = t('dispBtn');
    el('f-amarelo').textContent      = t('filaBtn');
    el('f-vermelho').textContent     = t('esgBtn');
    el('f-recentes').textContent     = t('recentes');
    el('f-gasolina').textContent     = t('gasolina');
    el('f-gasoleo').textContent      = t('gasoleo');
    el('fab-link').textContent       = t('reportar');
    el('countdown-label').textContent= t('proxAtu');
    el('tp-label').textContent       = t('topLabel');
    const sel = el('zona-select');
    if (sel.options[0]) sel.options[0].textContent = t('todasZonas');
  }

  /* ── PARSING ── */
  function normalizarStatus(raw) {
    if (!raw) return 'cinza';
    const r = raw.toLowerCase();
    if (r.includes('sem fila') || (r.includes('disponível') && !r.includes('fila'))) return 'verde';
    if (r.includes('fila') || r.includes('com fila')) return 'amarelo';
    if (r.includes('esgotado')) return 'vermelho';
    return 'cinza';
  }
  const badgeLabel = (s) => ({ verde: t('badgeVerde'), amarelo: t('badgeAmarelo'), vermelho: t('badgeVermelho'), cinza: '?' })[s] || '?';

  function parseData(ts) {
    if (!ts) return null;
    const m = ts.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})/);
    if (m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5], +m[6]);
    const d = new Date(ts); return isNaN(d) ? null : d;
  }

  function tempoRelativo(ts) {
    const d = parseData(ts); if (!d) return '';
    const diff = Math.floor((Date.now() - d) / 60000);
    if (diff < 2)  return lingua === 'pt' ? 'agora mesmo' : 'just now';
    if (diff < 60) return lingua === 'pt' ? `há ${diff} min` : `${diff} min ago`;
    const h = Math.floor(diff / 60), mn = diff % 60;
    return lingua === 'pt' ? (mn > 0 ? `há ${h}h ${mn}min` : `há ${h}h`) : (mn > 0 ? `${h}h ${mn}min ago` : `${h}h ago`);
  }

  function parseCombustivel(raw) {
    if (!raw) return [];
    const r = raw.toLowerCase();
    if (r.includes('ambos')) return ['ambos'];
    const t = [];
    if (r.includes('gasolina')) t.push('gasolina');
    if (r.includes('gasóleo') || r.includes('gasoleo') || r.includes('diesel')) t.push('gasoleo');
    return t;
  }

  function pillsCombustivel(tipos) {
    if (!tipos.length) return '';
    const g = lingua === 'pt' ? 'Gasolina' : 'Petrol';
    const d = lingua === 'pt' ? 'Gasóleo'  : 'Diesel';
    const b = lingua === 'pt' ? 'Gas + Diesel' : 'Petrol + Diesel';
    if (tipos.includes('ambos')) return `<span class="pill-comb pill-ambos">${b}</span>`;
    return tipos.map(tp => tp === 'gasolina' ? `<span class="pill-comb pill-gasolina">${g}</span>` : `<span class="pill-comb pill-gasoleo">${d}</span>`).join('');
  }

  function parseLinha(linha) {
    const campos = []; let atual = '', dentroAspas = false;
    for (let i = 0; i < linha.length; i++) {
      if (linha[i] === '"') { dentroAspas = !dentroAspas; continue; }
      if (linha[i] === ',' && !dentroAspas) { campos.push(atual.trim()); atual = ''; continue; }
      atual += linha[i];
    }
    campos.push(atual.trim()); return campos;
  }

  function parseCSV(text) {
    const linhas = text.trim().split('\n');
    const cab = parseLinha(linhas[0]).map(c => c.replace(/^[\s"'\uFEFF]+|[\s"']+$/g, ''));
    return linhas.slice(1).map(l => {
      const campos = parseLinha(l), obj = {};
      cab.forEach((k,i) => obj[k] = (campos[i]||'').replace(/^[\s"']+|[\s"']+$/g,''));
      return obj;
    }).filter(r => r['Nome da bomba de combustível']);
  }

  function maisRecentePorBomba(lista) {
    const mapa = {};
    lista.forEach(p => {
      const chave = (p['Nome da bomba de combustível']+'||'+(p['Bairro']||'')).toLowerCase().trim();
      const ts = parseData(p['Carimbo de data/hora']);
      if (!mapa[chave] || (ts && ts > (parseData(mapa[chave]['Carimbo de data/hora'])||0))) mapa[chave] = p;
    });
    return Object.values(mapa);
  }

  function bairroReal(p) {
    const outro = (p['Outro bairro. Qual?']||'').trim();
    return outro || (p['Bairro']||'').trim() || 'Outros';
  }

  function bairroExibicao(b) {
    const sujos = ['outro bairro - indique na pergunta abaixo','outro bairro','indique na pergunta abaixo'];
    if (sujos.some(s => b.toLowerCase().includes(s))) return lingua === 'pt' ? 'Outro bairro' : 'Other area';
    return b;
  }

  function agruparPorBairro(lista) {
    const g = {};
    lista.forEach(p => { const b = bairroReal(p); if (!g[b]) g[b]=[]; g[b].push(p); });
    return g;
  }

  function calcularTempoMedio(nomeBomba, bairro) {
    const agora = Date.now(), limite = 2*60*60*1000;
    const CAMPO = 'Quanto tempo esperaste na fila?';
    const mapa = {'Menos de 15 min':8,'15 a 30 min':22,'30 min a 1 hora':45,'Mais de 1 hora':75};
    const vals = todosOsDados.filter(p => {
      const ts = parseData(p['Carimbo de data/hora']);
      return ts && (agora-ts)<=limite
        && (p['Nome da bomba de combustível']||'').toLowerCase().trim()===nomeBomba.toLowerCase().trim()
        && bairroReal(p)===bairro && p[CAMPO] && mapa[p[CAMPO]];
    }).map(p => mapa[p[CAMPO]]);
    if (!vals.length) return null;
    const media = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    return t('tempoFila', media);
  }

  function contarReports(nomeBomba, bairro, status) {
    const agora = Date.now(), limite = 3*60*60*1000;
    return todosOsDados.filter(p => {
      const ts = parseData(p['Carimbo de data/hora']);
      return ts && (agora-ts)<=limite
        && (p['Nome da bomba de combustível']||'').toLowerCase().trim()===nomeBomba.toLowerCase().trim()
        && bairroReal(p)===bairro && normalizarStatus(p['Status'])===status;
    }).length;
  }

  /* ── TOP PICKS ── */
  function atualizarTopPicks() {
    const umaHora = 60 * 60 * 1000;
    const agora = Date.now();
    const candidatas = dados
      .filter(p => {
        const s = normalizarStatus(p['Status']);
        if (s !== 'verde' && s !== 'amarelo') return false;
        const ts = parseData(p['Carimbo de data/hora']);
        return ts && (agora - ts) <= umaHora;
      })
      .sort((a,b) => {
        const sa = normalizarStatus(a['Status']), sb = normalizarStatus(b['Status']);
        if (sa !== sb) return sa === 'verde' ? -1 : 1;
        return (parseData(b['Carimbo de data/hora'])||0) - (parseData(a['Carimbo de data/hora'])||0);
      })
      .slice(0, 3);

    const container = document.getElementById('top-picks-list');
    const vazio = document.getElementById('tp-vazio');

    if (!candidatas.length) {
      container.innerHTML = `<div class="top-picks-vazio">${t('topVazio')}</div>`;
      return;
    }

    container.innerHTML = candidatas.map(p => {
      const status  = normalizarStatus(p['Status']);
      const bairro  = bairroExibicao(bairroReal(p));
      const hora    = tempoRelativo(p['Carimbo de data/hora']);
      const tempoF  = status === 'amarelo' ? calcularTempoMedio(p['Nome da bomba de combustível'], bairroReal(p)) : null;
      const tipos   = parseCombustivel(p['Que tipo de combustível está disponível?']);
      const combStr = tipos.includes('ambos') ? (lingua==='pt'?'gas+diesel':'petrol+diesel') : tipos.includes('gasolina') ? (lingua==='pt'?'gasolina':'petrol') : tipos.includes('gasoleo') ? (lingua==='pt'?'gasóleo':'diesel') : '';
      const icone   = status === 'verde' ? '⛽' : '⏳';
      const statusLabel = status === 'verde' ? t('semFilaLabel') : (tempoF || t('comFilaLabel'));

      return `<div class="top-pick-item">
        <div class="tp-icon ${status}">${icone}</div>
        <div class="tp-info">
          <div class="tp-nome">${p['Nome da bomba de combustível']}</div>
          <div class="tp-bairro">${bairro}${combStr ? ' · ' + combStr : ''} · ${hora}</div>
        </div>
        <div class="tp-right">
          <div class="tp-status ${status}">${statusLabel}</div>
          ${tempoF ? `<div class="tp-fila">${tempoF}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  /* ── ALERTAS ── */
  function atualizarAlertaTransito(todosRaw) {
    const agora = Date.now(), limite = 60*60*1000;
    const bairrosComFila = {};
    todosRaw.forEach(p => {
      const ts = parseData(p['Carimbo de data/hora']);
      if (!ts || (agora-ts)>limite || normalizarStatus(p['Status'])!=='amarelo') return;
      const b = bairroReal(p);
      bairrosComFila[b] = (bairrosComFila[b]||0)+1;
    });
    const criticos = Object.entries(bairrosComFila).filter(([,n])=>n>=2).sort((a,b)=>b[1]-a[1]).map(([b])=>b);
    const el = document.getElementById('alerta-transito');
    if (criticos.length) {
      el.textContent = lingua==='pt'
        ? '⚠ Trânsito provável em: '+criticos.slice(0,4).join(', ')
        : '⚠ Likely traffic in: '+criticos.slice(0,4).join(', ');
      el.classList.add('visivel');
    } else { el.classList.remove('visivel'); }
  }

  function atualizarBanner(grupos) {
    const esgotados = Object.entries(grupos).filter(([,b])=>b.every(p=>normalizarStatus(p['Status'])==='vermelho')).map(([b])=>b);
    const banner = document.getElementById('banner-urgencia');
    if (esgotados.length >= 3) {
      banner.textContent = lingua==='pt'
        ? `⚠ Sem combustível em: ${esgotados.slice(0,5).join(', ')}`
        : `⚠ No fuel in: ${esgotados.slice(0,5).join(', ')}`;
      banner.classList.add('visivel');
    } else { banner.classList.remove('visivel'); }
  }

  /* ── ZONA ── */
  function popularSelectZona(bairros) {
    const sel = document.getElementById('zona-select');
    sel.innerHTML = `<option value="">${t('todasZonas')}</option>`;
    bairros.sort().forEach(b => {
      const opt = document.createElement('option');
      opt.value = b; opt.textContent = bairroExibicao(b);
      if (b === zonaActiva) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function guardarZona(val) {
    zonaActiva = val;
    val ? localStorage.setItem('minhaZona', val) : localStorage.removeItem('minhaZona');
    renderizar();
  }

  /* ── CONFIRMAR ── */
  function confirmar(chave, btn, status) {
    if (confirmacoes[chave]) return;
    confirmacoes[chave] = true;
    localStorage.setItem('confirmacoes', JSON.stringify(confirmacoes));
    btn.classList.add('confirmado');
    btn.textContent = fraseConf(status);
  }

  /* ── MODOS ── */
  function mudarModo(modo, btn) {
    modoActivo = modo;
    document.querySelectorAll('.modo-tab').forEach(b => b.className='modo-tab');
    btn.className = 'modo-tab on-'+modo;
    document.getElementById('painel-lista').style.display  = modo==='lista'  ? 'block' : 'none';
    document.getElementById('painel-resumo').style.display = modo==='resumo' ? 'block' : 'none';
    if (modo==='resumo') renderizarResumo();
  }

  function toggleHistorico() { mostrarHistorico = !mostrarHistorico; renderizar(); }

  /* ── RENDER ── */
  function renderizar() {
    let filtrados = dados;
    if (zonaActiva) filtrados = filtrados.filter(p => bairroReal(p)===zonaActiva);
    if (filtroStatus!=='todos') filtrados = filtrados.filter(p => normalizarStatus(p['Status'])===filtroStatus);
    if (filtroComb!=='todos') filtrados = filtrados.filter(p => {
      const tipos = parseCombustivel(p['Que tipo de combustível está disponível?']);
      return tipos.includes(filtroComb)||tipos.includes('ambos');
    });
    if (filtroRecentes) {
      const umaHora = 60*60*1000;
      filtrados = filtrados.filter(p => { const ts=parseData(p['Carimbo de data/hora']); return ts&&(Date.now()-ts)<=umaHora; });
    }

    const grupos = agruparPorBairro(filtrados);
    atualizarBanner(agruparPorBairro(dados));
    const bairros = Object.keys(grupos).sort();

    if (!bairros.length) { document.getElementById('lista').innerHTML=`<div class="vazio">${t('nenhuma')}</div>`; return; }

    const umaHora = 60*60*1000;
    const nAntigas = filtrados.filter(p=>{const ts=parseData(p['Carimbo de data/hora']); return !ts||(Date.now()-ts)>umaHora;}).length;
    let html = nAntigas>0&&!filtroRecentes ? `<div class="nota-desatualizada">${t('notaDes',nAntigas)}</div>` : '';

    bairros.forEach(bairro => {
      const bombas = grupos[bairro];
      html += `<div class="bairro-bloco"><div class="bairro-titulo">${bairroExibicao(bairro)}</div>`;
      bombas.sort((a,b)=>(parseData(b['Carimbo de data/hora'])||0)-(parseData(a['Carimbo de data/hora'])||0));
      bombas.forEach(p => {
        const status  = normalizarStatus(p['Status']);
        const ref     = (p['Referências sobre a bomba']||'').trim();
        const obs     = (p['Observações']||'').trim();
        const hora    = tempoRelativo(p['Carimbo de data/hora']);
        const detalhe = ref||obs;
        const tipos   = parseCombustivel(p['Que tipo de combustível está disponível?']);
        const chave   = (p['Nome da bomba de combustível']+'||'+(p['Bairro']||'')).toLowerCase().trim();
        const chaveE  = chave.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const jaConf  = !!confirmacoes[chave];
        const nRep    = contarReports(p['Nome da bomba de combustível'], bairroReal(p), status);
        const rClass  = nRep>=5?'alto':nRep>=2?'medio':'';
        const rLabel  = nRep>=2?(lingua==='pt'?`${nRep} reports confirmam`:`${nRep} reports confirm`):nRep===1?'1 report':'';
        const tempoF  = status==='amarelo' ? calcularTempoMedio(p['Nome da bomba de combustível'], bairroReal(p)) : null;
        const tsData  = parseData(p['Carimbo de data/hora']);
        const antigo  = tsData&&(Date.now()-tsData)>umaHora;
        const fAtual  = fraseAtu(status);
        const fConf   = jaConf ? fraseConf(status) : t('confirmarLabel');
        const antigoTxt = lingua==='pt'?'· pode estar desatualizado':'· may be outdated';

        html += `<div class="bomba-card">
          <div class="bomba-card-top">
            <div class="bomba-esq">
              <div class="dot dot-${status}"></div>
              <div class="bomba-info">
                <div class="bomba-nome">${p['Nome da bomba de combustível']}</div>
                ${tipos.length?`<div class="bomba-combustivel">${pillsCombustivel(tipos)}</div>`:''}
                ${detalhe?`<div class="bomba-obs">${detalhe}</div>`:''}
                ${hora?`<div class="bomba-hora">${hora}${antigo?` <span style="color:#ff6b6b;font-style:normal">${antigoTxt}</span>`:''}</div>`:''}
                ${rLabel?`<div class="report-count ${rClass}">${rLabel}</div>`:''}
                ${tempoF?`<div class="tempo-fila">⏱ ${tempoF}</div>`:''}
              </div>
            </div>
            <div class="badge badge-${status}">${badgeLabel(status)}</div>
          </div>
          <div class="bomba-card-footer">
            <button class="confirmar-btn ${jaConf?'confirmado':''}" onclick="confirmar('${chaveE}',this,'${status}')">${fConf}</button>
            <a class="actualizar-btn" href="${FORM_URL}" target="_blank">${fAtual}</a>
          </div>
        </div>`;
      });
      html += `</div>`;
    });

    const tresH = LIMITE_HORAS*60*60*1000;
    const nEsc = dados.filter(p=>{const ts=parseData(p['Carimbo de data/hora']);return !ts||(Date.now()-ts)>tresH;}).length;
    if (nEsc>0&&!mostrarHistorico) html+=`<div class="toggle-historico" onclick="toggleHistorico()">${t('verMais',nEsc)}</div>`;
    else if (mostrarHistorico&&nEsc>0) html+=`<div class="toggle-historico" onclick="toggleHistorico()">${t('ocultarAntigas')}</div>`;
    document.getElementById('lista').innerHTML = html;
  }

  /* ── RESUMO ── */
  function renderizarResumo() {
    const tresH = LIMITE_HORAS*60*60*1000;
    const base = dados.filter(p=>{const ts=parseData(p['Carimbo de data/hora']);return ts&&(Date.now()-ts)<=tresH;});
    const src = base.length>0?base:dados;
    const dispSF = src.filter(p=>normalizarStatus(p['Status'])==='verde');
    const dispCF = src.filter(p=>normalizarStatus(p['Status'])==='amarelo');
    const esgo   = src.filter(p=>normalizarStatus(p['Status'])==='vermelho');
    const hora   = new Date().toLocaleTimeString('pt-MZ',{hour:'2-digit',minute:'2-digit'});
    let txt = `<div class="resumo-titulo">${t('situacaoAs')} ${hora}</div>`;
    const wa = [lingua==='pt'?'*Ha Combustivel - Maputo* (situacao agora)':'*Ha Combustivel - Maputo* (situation now)'];

    const linhasB = (lista, emoji) => {
      let h='';
      lista.slice(0,6).forEach(p=>{
        const nome=p['Nome da bomba de combustível']||'?', b=bairroExibicao(bairroReal(p));
        const tipos=parseCombustivel(p['Que tipo de combustível está disponível?']);
        const comb=tipos.includes('ambos')?(lingua==='pt'?'gas+diesel':'petrol+diesel'):tipos.includes('gasolina')?(lingua==='pt'?'gasolina':'petrol'):tipos.includes('gasoleo')?(lingua==='pt'?'gasóleo':'diesel'):'';
        const when=tempoRelativo(p['Carimbo de data/hora']);
        const combTxt=comb?` (${comb})`:'';
        h+=`<span class="resumo-zona-txt"><b style="color:#1a1a18">${nome}</b> — ${b}${combTxt} · <span style="color:#444">${when}</span></span><br>`;
        wa.push(`${emoji} ${nome} - ${b}${combTxt} (${when})`);
      });
      return h;
    };

    if (dispSF.length) txt+=`<div class="resumo-zona"><span class="resumo-zona-nome">${t('semFila')}</span><br>${linhasB(dispSF,'[OK]')}</div>`;
    if (dispCF.length) txt+=`<div class="resumo-zona"><span class="resumo-zona-nome">${t('comFilaMas')}</span><br>${linhasB(dispCF,'[FILA]')}</div>`;
    if (esgo.length) {
      const nomes=esgo.slice(0,5).map(p=>`${p['Nome da bomba de combustível']} (${bairroExibicao(bairroReal(p))})`).join(', ');
      const frase=lingua==='pt'?`Nada em: ${nomes}.`:`Empty: ${nomes}.`;
      txt+=`<div class="resumo-zona"><span class="resumo-zona-nome">${t('esgLbl')}</span><br><span class="resumo-zona-txt" style="color:#ff6b6b">${frase}</span></div>`;
      wa.push(`[SEM] ${esgo.slice(0,5).map(p=>bairroExibicao(bairroReal(p))).join(', ')}`);
    }
    wa.push('','Ver tudo: https://nowledge-mz.github.io/hacombustivel', lingua==='pt'?'Um projecto Nowledge':'A Nowledge project');
    const waStr = wa.join('\n');

    document.getElementById('painel-resumo').innerHTML=`<div class="resumo-box">${txt}</div><button class="partilhar-resumo" id="btn-wa">${t('partilharWA')}</button>`;
    document.getElementById('btn-wa').addEventListener('click',()=>window.open('https://wa.me/?text='+encodeURIComponent(waStr),'_blank'));
  }

  /* ── FILTROS ── */
  function filtrar(f, btn) {
    filtroStatus=f;
    ['todos','verde','amarelo','vermelho'].forEach(id=>document.getElementById('f-'+id).className='fbtn');
    btn.className={todos:'fbtn on',verde:'fbtn on-verde',amarelo:'fbtn on-amarelo',vermelho:'fbtn on-verm'}[f];
    renderizar();
  }
  function filtrarRecentes(btn) { filtroRecentes=!filtroRecentes; btn.className=filtroRecentes?'fbtn on-recentes':'fbtn'; renderizar(); }
  function filtrarComb(f,btn) {
    if (filtroComb===f) { filtroComb='todos'; btn.className='fbtn'; }
    else { filtroComb=f; document.getElementById('f-gasolina').className='fbtn'; document.getElementById('f-gasoleo').className='fbtn'; btn.className=f==='gasolina'?'fbtn on-gasolina':'fbtn on-gasoleo'; }
    renderizar();
  }

  /* ── CARREGAR ── */
  async function carregarDados() {
    document.getElementById('header-sub').textContent = t('aatualizar');
    try {
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(), 15000);
      const resp = await fetch(SHEET_URL+'&t='+Date.now(), {signal:ctrl.signal});
      clearTimeout(to);
      const text = await resp.text();
      todosOsDados = parseCSV(text);
      const tresH = LIMITE_HORAS*60*60*1000;
      const rec = todosOsDados.filter(p=>{const ts=parseData(p['Carimbo de data/hora']);return ts&&(Date.now()-ts)<=tresH;});
      dados = maisRecentePorBomba(rec.length>=5?rec:todosOsDados);

      let nV=0,nA=0,nR=0;
      dados.forEach(p=>{const s=normalizarStatus(p['Status']);if(s==='verde')nV++;else if(s==='amarelo')nA++;else if(s==='vermelho')nR++;});
      document.getElementById('count-verde').textContent   = nV;
      document.getElementById('count-amarelo').textContent = nA;
      document.getElementById('count-vermelho').textContent= nR;

      const disp = nV+nA;
      document.getElementById('page-title').textContent = `(${disp} ${t('disponiveis')}) Há Combustível`;
      document.title = `(${disp} ${t('disponiveis')}) Há Combustível — Maputo`;
      const agora = new Date().toLocaleTimeString('pt-MZ',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('header-sub').textContent = `${todosOsDados.length} ${t('reportsHoje')} · ${agora}`;

      popularSelectZona([...new Set(dados.map(p=>bairroReal(p)))]);
      atualizarAlertaTransito(todosOsDados);
      atualizarTopPicks();
      aplicarTraducoes();
      renderizar();
      if (modoActivo==='resumo') renderizarResumo();
    } catch(e) {
      const msg = e.name==='AbortError'?t('erroLigacao'):t('erroCarregar');
      document.getElementById('header-sub').textContent = msg;
      document.getElementById('lista').innerHTML = `<div class="erro">${t('erroMsg')}</div>`;
    }
  }

  /* ── COUNTDOWN ── */
  let countdownInterval=null, nextRefresh=Date.now()+REFRESH_MS;
  function iniciarCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);
    nextRefresh = Date.now()+REFRESH_MS;
    countdownInterval = setInterval(()=>{
      const r=Math.max(0,nextRefresh-Date.now());
      const mins=Math.floor(r/60000), secs=Math.floor((r%60000)/1000);
      document.getElementById('countdown-num').textContent=mins+':'+String(secs).padStart(2,'0');
      document.getElementById('countdown-fill').style.width=Math.round(r/REFRESH_MS*100)+'%';
      if(r===0){carregarDados();iniciarCountdown();}
    },1000);
  }

  document.getElementById('lang-btn').textContent = lingua==='pt'?'EN':'PT';
  carregarDados().then(iniciarCountdown);
  setInterval(()=>{carregarDados();iniciarCountdown();},REFRESH_MS);
</script>
</body>
</html>
