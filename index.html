<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Há Combustível — Maputo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a18;
      max-width: 640px;
      margin: 0 auto;
    }

    .header {
      background: #1a1a18;
      color: #f5f5f0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-sub { font-size: 11px; color: #888; margin-top: 2px; }
    .header-refresh {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .header-refresh:hover { border-color: #888; color: #f5f5f0; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 16px;
      background: #ebebе6;
      border-bottom: 1px solid #ddd;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 600; }
    .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
    .num-verde    { color: #2d7a3a; }
    .num-amarelo  { color: #b07d00; }
    .num-vermelho { color: #c0392b; }

    .filtros {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
      flex-wrap: wrap;
    }
    .fbtn {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .fbtn:hover { border-color: #aaa; }
    .fbtn.on         { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    .fbtn.on-verde   { background: #2d7a3a; color: #fff; border-color: #2d7a3a; }
    .fbtn.on-amarelo { background: #b07d00; color: #fff; border-color: #b07d00; }
    .fbtn.on-verm    { background: #c0392b; color: #fff; border-color: #c0392b; }

    .lista { padding: 0 16px 24px; }

    .bairro-titulo {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 16px 0 6px;
    }

    .posto-card {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .posto-esq { display: flex; align-items: flex-start; gap: 10px; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0; margin-top: 5px;
    }
    .dot-verde    { background: #2d7a3a; }
    .dot-amarelo  { background: #b07d00; }
    .dot-vermelho { background: #c0392b; }
    .dot-cinza    { background: #aaa; }

    .posto-nome { font-size: 14px; font-weight: 600; color: #1a1a18; }
    .posto-empresa { font-size: 12px; color: #888; }
    .posto-obs  { font-size: 12px; color: #555; margin-top: 3px; font-style: italic; }
    .posto-hora { font-size: 11px; color: #bbb; margin-top: 3px; }

    .badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .badge-verde    { background: #e8f5e9; color: #2d7a3a; }
    .badge-amarelo  { background: #fff8e1; color: #b07d00; }
    .badge-vermelho { background: #fdecea; color: #c0392b; }
    .badge-cinza    { background: #f0f0f0; color: #888; }

    .vazio {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 48px 20px;
      color: #888;
      font-size: 14px;
    }

    .erro {
      margin: 16px;
      padding: 12px 16px;
      background: #fdecea;
      border-radius: 8px;
      font-size: 13px;
      color: #c0392b;
    }

    .report-link {
      display: block;
      margin: 0 16px 8px;
      padding: 11px 16px;
      background: #1a1a18;
      color: #f5f5f0;
      text-align: center;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .report-link:hover { background: #333; }

    .report-wrap {
      padding: 12px 16px 0;
      border-top: 1px solid #e8e8e4;
      margin-top: 8px;
    }
    .report-label {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 6px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Há Combustível — Maputo</div>
    <div class="header-sub" id="header-sub">a carregar...</div>
  </div>
  <button class="header-refresh" onclick="carregarDados()">↻ Atualizar</button>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num num-verde" id="count-verde">—</div>
    <div class="stat-label">disponível</div>
  </div>
  <div class="stat-card">
    <div class="stat-num num-amarelo" id="count-amarelo">—</div>
    <div class="stat-label">com fila</div>
  </div>
  <div class="stat-card">
    <div class="stat-num num-vermelho" id="count-vermelho">—</div>
    <div class="stat-label">esgotado</div>
  </div>
</div>

<div class="filtros">
  <button class="fbtn on"       id="f-todos"   onclick="filtrar('todos',this)">Todos</button>
  <button class="fbtn"          id="f-verde"   onclick="filtrar('verde',this)">Disponível</button>
  <button class="fbtn"          id="f-amarelo" onclick="filtrar('amarelo',this)">Com fila</button>
  <button class="fbtn"          id="f-vermelho" onclick="filtrar('vermelho',this)">Esgotado</button>
</div>

<div class="lista" id="lista">
  <div class="loading">A carregar postos...</div>
</div>

<div class="report-wrap">
  <a class="report-link" id="report-link" href="#" target="_blank">+ Reportar um posto</a>
  <div class="report-label">Leva menos de 30 segundos. Os dados são partilhados com a comunidade.</div>
</div>

<script>
  // ─── CONFIGURAÇÃO ─────────────────────────────────────────
  const SHEET_ID   = '11IQ6x3d9j9csRmn4z1k6pyK2FZzJ210PzvSw0vnKW0Q';
  const FORM_URL   = 'https://docs.google.com/forms/d/e/1FAIpQLSfv-UJyaqEVK3CF_c9yQaq1iE6Lr4dHmJhd0nU9DGRYhLxcCQ/viewform';
  // Substitui SEU_FORM_ID pelo ID do teu Google Form
  // ──────────────────────────────────────────────────────────

  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
  const REFRESH_MS = 5 * 60 * 1000;

  let dados = [];
  let filtroAtivo = 'todos';

  document.getElementById('report-link').href = FORM_URL;

  function normalizarStatus(raw) {
    if (!raw) return 'cinza';
    const r = raw.toLowerCase();
    if (r.includes('sem fila') || (r.includes('disponível') && !r.includes('fila'))) return 'verde';
    if (r.includes('fila') || r.includes('com fila')) return 'amarelo';
    if (r.includes('esgotado')) return 'vermelho';
    return 'cinza';
  }

  function badgeLabel(status) {
    return { verde: 'Disponível', amarelo: 'Com fila', vermelho: 'Esgotado', cinza: 'Desconhecido' }[status];
  }

  function tempoRelativo(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d)) return '';
    const diff = Math.floor((Date.now() - d) / 60000);
    if (diff < 2)  return 'agora mesmo';
    if (diff < 60) return `há ${diff} min`;
    const h = Math.floor(diff / 60);
    const m = diff % 60;
    return m > 0 ? `há ${h}h ${m}min` : `há ${h}h`;
  }

  function parseCSV(text) {
    const linhas = text.trim().split('\n');
    const cabecalho = linhas[0].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    return linhas.slice(1).map(linha => {
      const campos = [];
      let atual = '', dentroAspas = false;
      for (let i = 0; i < linha.length; i++) {
        if (linha[i] === '"') { dentroAspas = !dentroAspas; continue; }
        if (linha[i] === ',' && !dentroAspas) { campos.push(atual.trim()); atual = ''; continue; }
        atual += linha[i];
      }
      campos.push(atual.trim());
      const obj = {};
      cabecalho.forEach((k, i) => obj[k] = campos[i] || '');
      return obj;
    }).filter(r => r['Nome do posto de combustível']);
  }

  function agruparPorBairro(lista) {
    const grupos = {};
    lista.forEach(p => {
      const b = p['Bairro'] || 'Outros';
      if (!grupos[b]) grupos[b] = [];
      grupos[b].push(p);
    });
    return grupos;
  }

  function renderizar() {
    const filtrados = filtroAtivo === 'todos'
      ? dados
      : dados.filter(p => normalizarStatus(p['Status']) === filtroAtivo);

    const grupos = agruparPorBairro(filtrados);
    const bairros = Object.keys(grupos).sort();

    if (!bairros.length) {
      document.getElementById('lista').innerHTML = '<div class="vazio">Nenhum posto com este status agora.</div>';
      return;
    }

    let html = '';
    bairros.forEach(bairro => {
      html += `<div class="bairro-titulo">${bairro}</div>`;
      grupos[bairro].forEach(p => {
        const status = normalizarStatus(p['Status']);
        const obs = p['Observações'] || '';
        const hora = tempoRelativo(p['Carimbo de data/hora']);
        html += `
          <div class="posto-card">
            <div class="posto-esq">
              <div class="dot dot-${status}"></div>
              <div>
                <div class="posto-nome">${p['Nome do posto de combustível']}</div>
                ${obs ? `<div class="posto-obs">${obs}</div>` : ''}
                ${hora ? `<div class="posto-hora">${hora}</div>` : ''}
              </div>
            </div>
            <div class="badge badge-${status}">${badgeLabel(status)}</div>
          </div>`;
      });
    });

    document.getElementById('lista').innerHTML = html;
  }

  function filtrar(f, btn) {
    filtroAtivo = f;
    ['todos','verde','amarelo','vermelho'].forEach(id => {
      const b = document.getElementById('f-' + id);
      b.className = 'fbtn';
    });
    const classes = { todos: 'fbtn on', verde: 'fbtn on-verde', amarelo: 'fbtn on-amarelo', vermelho: 'fbtn on-verm' };
    btn.className = classes[f];
    renderizar();
  }

  async function carregarDados() {
    document.getElementById('header-sub').textContent = 'a atualizar...';
    try {
      const resp = await fetch(SHEET_URL + '&t=' + Date.now());
      const text = await resp.text();
      dados = parseCSV(text);

      let nV = 0, nA = 0, nR = 0;
      dados.forEach(p => {
        const s = normalizarStatus(p['Status']);
        if (s === 'verde')    nV++;
        else if (s === 'amarelo') nA++;
        else if (s === 'vermelho') nR++;
      });

      document.getElementById('count-verde').textContent    = nV;
      document.getElementById('count-amarelo').textContent  = nA;
      document.getElementById('count-vermelho').textContent = nR;

      const agora = new Date().toLocaleTimeString('pt-MZ', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('header-sub').textContent = `${dados.length} reports · atualizado às ${agora}`;

      renderizar();
    } catch (e) {
      document.getElementById('header-sub').textContent = 'erro ao carregar';
      document.getElementById('lista').innerHTML = '<div class="erro">Não foi possível carregar os dados. Verifica a ligação e tenta novamente.</div>';
    }
  }

  carregarDados();
  setInterval(carregarDados, REFRESH_MS);
</script>
</body>
</html>
